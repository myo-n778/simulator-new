<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>物理シミュレーター</title>
  <link rel="stylesheet" href="./assets/common.css">
  <script src="./assets/index.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="shell">
      <div class="brand">物理シミュレーター</div>
      <p class="header-note">整理済み <span data-simulator-count>読み込み中</span> / 最終確認 <span data-last-reviewed>読み込み中</span></p>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="shell">
        <h1>物理の動きを、ひとつずつ確かめる。</h1>
        <p>元版を残したまま、見やすさと操作感を整えたリメイク版を並べています。</p>
        <div class="variant-switch" role="group" aria-label="表示する版">
          <button type="button" data-version-mode="re">リメイク版を優先</button>
          <button type="button" data-version-mode="original">元版を優先</button>
        </div>
      </div>
    </section>

    <div data-simulator-list>
      <section class="section">
        <div class="shell">
          <p class="loading">シミュレータ一覧を読み込んでいます。</p>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
