<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>等速円運動と正弦波シミュレーター</title>
<link rel="stylesheet" href="../../assets/common-sim.css">
<script src="../../assets/sim-shell.js"></script>
<script src="../../assets/sim-clock.js"></script>
<style>
  :root {
    --bg: #08111c;
    --surface: #0d1825;
    --surface-2: #101f2f;
    --line: #243548;
    --line-soft: rgba(203, 213, 225, .16);
    --ink: #edf7ff;
    --muted: #94a9bd;
    --cyan: #39e7f4;
    --cyan-soft: rgba(57, 231, 244, .18);
    --amber: #ffc83d;
    --red: #ff6b6b;
    --blue: #3f73ff;
    --green: #8ae46c;
    --violet: #d88cff;
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  button,
  input {
    font: inherit;
  }

  .wrap {
    width: min(1360px, calc(100% - 24px));
    margin: 14px auto 24px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 12px;
    align-items: start;
  }

  .stage-panel,
  .control-panel {
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: linear-gradient(180deg, #0f1c2a 0%, #0a1420 100%);
    box-shadow: 0 14px 36px rgba(0, 0, 0, .28);
  }

  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    min-height: 48px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
  }

  h1,
  h2 {
    margin: 0;
    letter-spacing: 0;
  }

  h1 {
    font-size: 18px;
    line-height: 1.25;
  }

  h2,
  .panel-title {
    color: #dbeafe;
    font-size: 13px;
    font-weight: 800;
  }

  .formula {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  .canvas-shell {
    padding: 12px;
  }

  canvas {
    display: block;
    width: 100%;
    height: min(70vh, 720px);
    min-height: 560px;
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    background:
      linear-gradient(rgba(148, 163, 184, .045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148, 163, 184, .045) 1px, transparent 1px),
      radial-gradient(circle at 24% 18%, rgba(57, 231, 244, .09), transparent 28%),
      #07111d;
    background-size: 24px 24px, 24px 24px, auto, auto;
    touch-action: none;
  }

  .status-strip {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 8px;
    padding: 0 12px 12px;
  }

  .stat {
    min-width: 0;
    border: 1px solid var(--line-soft);
    border-radius: 7px;
    background: rgba(15, 31, 47, .76);
    padding: 8px 9px;
  }

  .stat-label {
    overflow: hidden;
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .stat-value {
    margin-top: 2px;
    color: var(--ink);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    white-space: nowrap;
  }

  .control-panel {
    position: sticky;
    top: 72px;
  }

  .controls {
    display: grid;
    gap: 12px;
    padding: 12px;
  }

  .button-row {
    display: grid;
    grid-template-columns: 1fr 42px;
    gap: 8px;
  }

  .main-button,
  .icon-button,
  .small-button {
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: var(--surface-2);
    color: var(--ink);
    cursor: pointer;
  }

  .main-button {
    background: linear-gradient(180deg, #18a65c 0%, #0f8847 100%);
    border-color: rgba(138, 228, 108, .42);
    font-weight: 800;
  }

  .main-button[data-playing="false"] {
    background: linear-gradient(180deg, #1b6eea 0%, #1354b8 100%);
    border-color: rgba(99, 179, 237, .46);
  }

  .icon-button {
    font-size: 18px;
    font-weight: 800;
  }

  .main-button:hover,
  .main-button:focus-visible,
  .icon-button:hover,
  .icon-button:focus-visible,
  .small-button:hover,
  .small-button:focus-visible {
    border-color: var(--cyan);
    outline: none;
  }

  .group {
    display: grid;
    gap: 9px;
  }

  .range-row {
    display: grid;
    grid-template-columns: 74px minmax(0, 1fr) 54px;
    gap: 8px;
    align-items: center;
  }

  .range-row label {
    color: #d7e7f8;
    font-size: 12px;
    font-weight: 800;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--cyan);
  }

  output {
    color: var(--ink);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    text-align: right;
  }

  .switch-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .check {
    display: flex;
    align-items: center;
    gap: 7px;
    min-height: 34px;
    padding: 7px 8px;
    border: 1px solid var(--line-soft);
    border-radius: 7px;
    background: rgba(16, 31, 47, .7);
    color: #cfe0f2;
    font-size: 12px;
    font-weight: 700;
  }

  .check input {
    width: 16px;
    height: 16px;
    margin: 0;
    accent-color: var(--cyan);
  }

  .equation {
    border: 1px solid var(--line-soft);
    border-radius: 7px;
    background: rgba(3, 9, 17, .48);
    padding: 9px 10px;
    color: #cbd5e1;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }

  .equation strong {
    color: var(--cyan);
    font-weight: 800;
  }

  @media (max-width: 1040px) {
    .wrap {
      grid-template-columns: 1fr;
    }

    .control-panel {
      position: static;
    }

    .status-strip {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    canvas {
      height: min(68vh, 620px);
      min-height: 520px;
    }
  }

  @media (max-width: 640px) {
    .wrap {
      display: block;
      width: calc(100% - 16px);
      margin-top: 10px;
    }

    .stage-panel,
    .control-panel {
      width: 100%;
      overflow: hidden;
    }

    .control-panel {
      margin-top: 10px;
    }

    .panel-head {
      align-items: flex-start;
      flex-direction: column;
    }

    .formula {
      white-space: normal;
    }

    .status-strip,
    .switch-grid {
      grid-template-columns: 1fr 1fr;
    }

    .range-row {
      grid-template-columns: 68px minmax(0, 1fr) 48px;
    }

    canvas {
      height: 560px;
      min-height: 500px;
    }
  }
</style>
  <link rel="stylesheet" href="../../assets/remake.css">
</head>
<body class="remake-ui">
  <div class="remake-badge-host"><span class="remake-ribbon">リメイク版</span></div>
<script>
  PhysicsSimShell.create({
    title: "等速円運動と正弦波",
    subtitle: "円運動の射影・進行波・縦波の対応",
    basePath: "../../"
  });
</script>

<main class="wrap">
  <section class="stage-panel" aria-labelledby="stage-title">
    <div class="panel-head">
      <h1 id="stage-title">円運動から生まれる波</h1>
      <div class="formula">y = A sin(ωt + φ − kx),　v = λ / T</div>
    </div>
    <div class="canvas-shell">
      <canvas id="scene" width="1200" height="720"></canvas>
    </div>
    <div class="status-strip" aria-live="polite">
      <div class="stat">
        <div class="stat-label">時刻 t</div>
        <div class="stat-value" id="timeReadout">0.00 s</div>
      </div>
      <div class="stat">
        <div class="stat-label">角度 θ</div>
        <div class="stat-value" id="thetaReadout">0.00 rad</div>
      </div>
      <div class="stat">
        <div class="stat-label">y(0,t)</div>
        <div class="stat-value" id="originReadout">0.00 m</div>
      </div>
      <div class="stat">
        <div class="stat-label">マーカー y</div>
        <div class="stat-value" id="markerReadout">0.00 m</div>
      </div>
      <div class="stat">
        <div class="stat-label">波の速さ v</div>
        <div class="stat-value" id="velocityReadout">1.00 m/s</div>
      </div>
      <div class="stat">
        <div class="stat-label">波数 k</div>
        <div class="stat-value" id="waveNumberReadout">3.14 rad/m</div>
      </div>
    </div>
  </section>

  <aside class="control-panel" aria-labelledby="controls-title">
    <div class="panel-head">
      <h2 id="controls-title">操作</h2>
      <span class="panel-title">同期表示</span>
    </div>
    <div class="controls">
      <div class="button-row">
        <button class="main-button" id="togglePlay" type="button" data-playing="true">⏸ 一時停止</button>
        <button class="icon-button" id="reset" type="button" aria-label="リセット">↺</button>
      </div>

      <div class="group">
        <div class="range-row">
          <label for="amplitude">振幅 A</label>
          <input id="amplitude" type="range" min="0.2" max="2" step="0.01" value="1">
          <output id="amplitudeOut" for="amplitude">1.00</output>
        </div>
        <div class="range-row">
          <label for="period">周期 T</label>
          <input id="period" type="range" min="0.5" max="4" step="0.01" value="2">
          <output id="periodOut" for="period">2.00</output>
        </div>
        <div class="range-row">
          <label for="wavelength">波長 λ</label>
          <input id="wavelength" type="range" min="0.5" max="6" step="0.01" value="2">
          <output id="wavelengthOut" for="wavelength">2.00</output>
        </div>
        <div class="range-row">
          <label for="speed">再生</label>
          <input id="speed" type="range" min="0" max="2.5" step="0.01" value="1">
          <output id="speedOut" for="speed">1.00</output>
        </div>
        <div class="range-row">
          <label for="phase">初期 φ</label>
          <input id="phase" type="range" min="-3.14159" max="3.14159" step="0.01" value="0">
          <output id="phaseOut" for="phase">0.00</output>
        </div>
        <div class="range-row">
          <label for="marker">マーカー</label>
          <input id="marker" type="range" min="0" max="8" step="0.01" value="0.8">
          <output id="markerOut" for="marker">0.80</output>
        </div>
        <div class="range-row">
          <label for="length">表示 L</label>
          <input id="length" type="range" min="4" max="12" step="0.1" value="8">
          <output id="lengthOut" for="length">8.0</output>
        </div>
      </div>

      <div class="switch-grid">
        <label class="check"><input id="showGuides" type="checkbox" checked> ガイド線</label>
        <label class="check"><input id="showTrail" type="checkbox" checked> 円の軌跡</label>
        <label class="check"><input id="showParticles" type="checkbox" checked> 粒子の色</label>
        <label class="check"><input id="showConnector" type="checkbox" checked> 対応線</label>
        <label class="check"><input id="reverseDirection" type="checkbox"> 左向き進行</label>
      </div>

      <div class="equation">
        <strong>横波</strong> は上下変位、<strong>縦波</strong> は同じ位相を左右変位として表示します。
      </div>
    </div>
  </aside>
</main>

<script>
(function () {
  const canvas = document.querySelector("#scene");
  const ctx = canvas.getContext("2d");
  const controls = {
    amplitude: document.querySelector("#amplitude"),
    period: document.querySelector("#period"),
    wavelength: document.querySelector("#wavelength"),
    speed: document.querySelector("#speed"),
    phase: document.querySelector("#phase"),
    marker: document.querySelector("#marker"),
    length: document.querySelector("#length"),
    showGuides: document.querySelector("#showGuides"),
    showTrail: document.querySelector("#showTrail"),
    showParticles: document.querySelector("#showParticles"),
    showConnector: document.querySelector("#showConnector"),
    reverseDirection: document.querySelector("#reverseDirection")
  };
  const outputs = {
    formula: document.querySelector(".formula"),
    amplitude: document.querySelector("#amplitudeOut"),
    period: document.querySelector("#periodOut"),
    wavelength: document.querySelector("#wavelengthOut"),
    speed: document.querySelector("#speedOut"),
    phase: document.querySelector("#phaseOut"),
    marker: document.querySelector("#markerOut"),
    length: document.querySelector("#lengthOut"),
    time: document.querySelector("#timeReadout"),
    theta: document.querySelector("#thetaReadout"),
    origin: document.querySelector("#originReadout"),
    markerY: document.querySelector("#markerReadout"),
    velocity: document.querySelector("#velocityReadout"),
    waveNumber: document.querySelector("#waveNumberReadout")
  };
  const togglePlayButton = document.querySelector("#togglePlay");
  const resetButton = document.querySelector("#reset");
  const maxAmplitude = Number(controls.amplitude.max);
  const state = {
    t: 0,
    playing: !window.matchMedia("(prefers-reduced-motion: reduce)").matches,
    draggingMarker: false,
    layout: null
  };

  function values() {
    const amplitude = Number(controls.amplitude.value);
    const period = Number(controls.period.value);
    const wavelength = Number(controls.wavelength.value);
    const phase = Number(controls.phase.value);
    const length = Number(controls.length.value);
    const marker = Math.min(Number(controls.marker.value), length);
    const direction = controls.reverseDirection.checked ? -1 : 1;
    const omega = 2 * Math.PI / period;
    const k = 2 * Math.PI / wavelength;
    const theta = omega * state.t + phase;
    return {
      amplitude,
      period,
      wavelength,
      speed: Number(controls.speed.value),
      phase,
      length,
      marker,
      direction,
      omega,
      k,
      theta,
      velocity: wavelength / period
    };
  }

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const width = Math.max(320, Math.round(rect.width * dpr));
    const height = Math.max(420, Math.round(rect.height * dpr));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { width: rect.width, height: rect.height };
  }

  function draw() {
    const size = resizeCanvas();
    const p = values();
    const width = size.width;
    const height = size.height;
    ctx.clearRect(0, 0, width, height);

    const pad = width < 720 ? 20 : 28;
    const topHeight = Math.max(285, height * 0.58);
    const dividerY = topHeight + 14;
    const waveX0 = Math.min(width * 0.38, 420);
    const waveX1 = width - pad;
    const waveWidth = Math.max(180, waveX1 - waveX0);
    const unitR = Math.max(30, Math.min(54, topHeight * 0.17, (waveX0 - pad) * 0.22));
    const circleMaxR = unitR * maxAmplitude;
    const centerX = pad + circleMaxR + Math.max(8, (waveX0 - pad - circleMaxR * 2) * 0.34);
    const centerY = Math.max(155, topHeight * 0.52);
    const axisY = centerY;
    const ampPx = unitR * p.amplitude;
    const markerX = waveX0 + (p.marker / p.length) * waveWidth;
    const originY = p.amplitude * Math.sin(p.theta);
    const markerY = waveY(p.marker, p);
    const pointX = centerX + ampPx * Math.cos(p.theta);
    const pointY = centerY - ampPx * Math.sin(p.theta);

    drawTopLabels(pad, waveX0, waveX1, axisY, dividerY, p);
    drawCircle(centerX, centerY, unitR, circleMaxR, ampPx, pointX, pointY, p);
    drawTransverseWave(waveX0, waveX1, axisY, circleMaxR, p, markerX, markerY);
    if (controls.showConnector.checked) {
      drawConnector(pointX, pointY, waveX0, axisY - originY / maxAmplitude * circleMaxR, markerX, axisY - markerY / maxAmplitude * circleMaxR);
    }
    drawLongitudinal(waveX0, waveX1, dividerY, height, circleMaxR, p, markerX);
    drawReadouts(p, originY, markerY);
    state.layout = { waveX0, waveX1, waveWidth, length: p.length };
  }

  function drawTopLabels(pad, waveX0, waveX1, axisY, dividerY, p) {
    ctx.save();
    drawSectionLine(12, dividerY - 2, waveX1 + 2);
    ctx.fillStyle = "#dbeafe";
    ctx.font = "800 14px system-ui, sans-serif";
    ctx.fillText("等速円運動", pad, 30);
    ctx.fillText("横波（y 変位）", waveX0, 30);
    ctx.fillText("縦波（疎密）", waveX0, dividerY + 30);
    drawDirectionArrow(waveX1, 54, p.direction);
    ctx.fillStyle = "#39e7f4";
    ctx.font = "800 13px system-ui, sans-serif";
    ctx.fillText("波の進行方向", waveX1 - 240, 42);
    drawDirectionArrow(waveX1, dividerY + 50, p.direction);
    ctx.fillText("波の進行方向", waveX1 - 240, dividerY + 38);
    ctx.restore();
  }

  function drawCircle(cx, cy, unitR, maxR, r, px, py, p) {
    ctx.save();
    if (controls.showGuides.checked) {
      ctx.strokeStyle = "rgba(255, 200, 61, .36)";
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 5]);
      circle(cx, cy, unitR);
      ctx.stroke();
      ctx.setLineDash([]);
      drawAxis(cx - maxR - 16, cy, cx + maxR + 34, cy, "#cbd5e1");
      drawArrow(cx, cy + maxR + 26, cx, cy - maxR - 30, "#cbd5e1", 1.4);
      ctx.fillStyle = "#dbeafe";
      ctx.font = "700 13px system-ui, sans-serif";
      ctx.fillText("x", cx + maxR + 24, cy + 18);
      ctx.fillText("y", cx - 14, cy - maxR - 30);
      ctx.fillStyle = "#ffc83d";
      ctx.font = "800 13px system-ui, sans-serif";
      ctx.fillText("1.00", cx - 18, cy - unitR - 10);
      ctx.fillText("-1.00", cx - 34, cy + unitR + 22);
    }

    if (controls.showTrail.checked) {
      ctx.strokeStyle = "rgba(255, 200, 61, .64)";
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(4, r), -p.theta - 0.95, -p.theta);
      ctx.stroke();
    }

    ctx.strokeStyle = "rgba(255, 255, 255, .82)";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(px, py);
    ctx.stroke();
    drawDot(cx, cy, 3.6, "#edf7ff", "#07111d");
    drawDot(px, py, 5.4, "#ffc83d", "#fff3b0");
    ctx.fillStyle = "#dbeafe";
    ctx.font = "700 13px system-ui, sans-serif";
    ctx.fillText("O", cx - 19, cy + 20);
    ctx.restore();
  }

  function drawTransverseWave(x0, x1, axisY, maxR, p, markerX, markerY) {
    ctx.save();
    const waveWidth = x1 - x0;
    const yScale = maxR / maxAmplitude;
    drawAxis(x0 - 8, axisY, x1 + 12, axisY, "#cbd5e1");
    drawArrow(x0, axisY + maxR + 18, x0, axisY - maxR - 24, "#cbd5e1", 1.4);
    ctx.fillStyle = "#dbeafe";
    ctx.font = "700 13px system-ui, sans-serif";
    ctx.fillText("x", x1 + 4, axisY + 20);
    ctx.fillText("y", x0 - 18, axisY - maxR - 27);
    ctx.fillStyle = "#94a9bd";
    ctx.font = "700 12px system-ui, sans-serif";
    ctx.fillText("x=0", x0 + 6, axisY + maxR + 18);
    if (controls.showGuides.checked) {
      ctx.strokeStyle = "rgba(203, 213, 225, .22)";
      ctx.lineWidth = 1;
      ctx.setLineDash([7, 7]);
      ctx.beginPath();
      ctx.moveTo(x0, axisY - p.amplitude * yScale);
      ctx.lineTo(x1, axisY - p.amplitude * yScale);
      ctx.moveTo(x0, axisY + p.amplitude * yScale);
      ctx.lineTo(x1, axisY + p.amplitude * yScale);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "#ffc83d";
      ctx.font = "800 13px system-ui, sans-serif";
      ctx.fillText("A", x0 - 24, axisY - p.amplitude * yScale + 4);
      ctx.fillText("-A", x0 - 30, axisY + p.amplitude * yScale + 4);
      drawTicks(x0, x1, axisY, p.length, p.wavelength);
    }

    ctx.lineWidth = 3.4;
    ctx.strokeStyle = "#39e7f4";
    ctx.shadowBlur = 14;
    ctx.shadowColor = "rgba(57, 231, 244, .42)";
    ctx.beginPath();
    const steps = Math.max(240, Math.round(waveWidth));
    for (let i = 0; i <= steps; i += 1) {
      const u = i / steps;
      const x = u * p.length;
      const px = x0 + u * waveWidth;
      const py = axisY - waveY(x, p) * yScale;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    const originY = waveY(0, p);
    drawDot(x0, axisY - originY * yScale, 5.2, "#ffc83d", "#fff3b0");
    drawVerticalMarker(markerX, axisY - markerY * yScale, axisY, "#ff6b6b");
    drawDot(markerX, axisY - markerY * yScale, 5.0, "#ff6b6b", "#ffd0d0");
    ctx.restore();
  }

  function drawLongitudinal(x0, x1, dividerY, height, maxR, p, markerX) {
    ctx.save();
    const y = dividerY + Math.max(92, (height - dividerY) * 0.34);
    const waveWidth = x1 - x0;
    const displacement = Math.min(28, Math.max(8, waveWidth / p.length * p.wavelength * .12)) * p.amplitude / maxAmplitude;
    drawAxis(x0 - 8, y, x1 + 12, y, "#cbd5e1");
    drawLowerSineCurve(x0, x1, y, dividerY, height, p);
    const rows = 3;
    const count = Math.max(84, Math.min(150, Math.round(waveWidth / 8)));
    for (let row = 0; row < rows; row += 1) {
      const yy = y + (row - 1) * 13;
      for (let i = 0; i < count; i += 1) {
        const u = i / (count - 1);
        const x = u * p.length;
        const phase = phaseAt(x, p);
        const shift = displacement * Math.sin(phase);
        const compression = Math.cos(phase);
        const px = x0 + u * waveWidth + shift;
        const radius = row === 1 ? 3.7 : 3.1;
        const color = controls.showParticles.checked ? densityColor(compression) : "#dbeafe";
        drawDot(px, yy, radius, color, "rgba(255,255,255,.7)");
      }
    }

    ctx.strokeStyle = "rgba(255, 107, 107, .88)";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(markerX, dividerY + 38);
    ctx.lineTo(markerX, y + 56);
    ctx.stroke();
    ctx.setLineDash([]);
    drawCompressionLegend(x0 + 20, y + 72, Math.min(460, waveWidth - 40));
    ctx.restore();
  }

  function drawCompressionLegend(x, y, width) {
    const gradient = ctx.createLinearGradient(x, y, x + width, y);
    gradient.addColorStop(0, "#3f73ff");
    gradient.addColorStop(.5, "#eef6ff");
    gradient.addColorStop(1, "#ff595e");
    ctx.fillStyle = gradient;
    roundRect(x, y - 5, width, 10, 5);
    ctx.fill();
    ctx.fillStyle = "#cbd5e1";
    ctx.font = "700 12px system-ui, sans-serif";
    ctx.fillText("圧縮", x - 42, y + 4);
    ctx.fillText("疎", x + width + 10, y + 4);
  }

  function drawReadouts(p, originY, markerY) {
    outputs.time.textContent = `${state.t.toFixed(2)} s`;
    outputs.theta.textContent = formatPiFraction(p.theta);
    outputs.origin.textContent = `${originY.toFixed(2)} m`;
    outputs.markerY.textContent = `${markerY.toFixed(2)} m`;
    outputs.velocity.textContent = `${p.direction === 1 ? "右向き" : "左向き"} ${p.velocity.toFixed(2)} m/s`;
    outputs.waveNumber.textContent = `${p.k.toFixed(2)} rad/m`;
  }

  function updateControlOutputs() {
    const p = values();
    outputs.formula.textContent = `y = A sin(ωt + φ ${p.direction === 1 ? "−" : "+"} kx),　v = λ / T`;
    outputs.amplitude.textContent = p.amplitude.toFixed(2);
    outputs.period.textContent = p.period.toFixed(2);
    outputs.wavelength.textContent = p.wavelength.toFixed(2);
    outputs.speed.textContent = p.speed.toFixed(2);
    outputs.phase.textContent = p.phase.toFixed(2);
    outputs.marker.textContent = p.marker.toFixed(2);
    outputs.length.textContent = p.length.toFixed(1);
    controls.marker.max = String(p.length);
    if (Number(controls.marker.value) > p.length) controls.marker.value = String(p.length);
    togglePlayButton.dataset.playing = String(state.playing);
    togglePlayButton.textContent = state.playing ? "⏸ 一時停止" : "▶ 再生";
  }

  function waveY(x, p) {
    return p.amplitude * Math.sin(phaseAt(x, p));
  }

  function phaseAt(x, p) {
    return p.theta - p.direction * p.k * x;
  }

  function setMarkerFromClientX(clientX) {
    if (!state.layout) return;
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const raw = (x - state.layout.waveX0) / state.layout.waveWidth * state.layout.length;
    const clamped = Math.max(0, Math.min(state.layout.length, raw));
    controls.marker.value = clamped.toFixed(2);
    updateControlOutputs();
    draw();
  }

  function densityColor(v) {
    const t = Math.max(0, Math.min(1, (v + 1) / 2));
    const left = [63, 115, 255];
    const mid = [238, 246, 255];
    const right = [255, 89, 94];
    const a = t < .5 ? left : mid;
    const b = t < .5 ? mid : right;
    const u = t < .5 ? t * 2 : (t - .5) * 2;
    const r = Math.round(a[0] + (b[0] - a[0]) * u);
    const g = Math.round(a[1] + (b[1] - a[1]) * u);
    const blue = Math.round(a[2] + (b[2] - a[2]) * u);
    return `rgb(${r}, ${g}, ${blue})`;
  }

  function wrapAngle(angle) {
    const tau = 2 * Math.PI;
    return ((angle % tau) + tau) % tau;
  }

  function formatPiFraction(angle) {
    const denominator = 24;
    let numerator = Math.round(wrapAngle(angle) / Math.PI * denominator);
    if (numerator === 0) return "0";
    if (numerator >= denominator * 2) return "2π";
    const divisor = gcd(numerator, denominator);
    numerator /= divisor;
    const reducedDenominator = denominator / divisor;
    if (reducedDenominator === 1) {
      return numerator === 1 ? "π" : `${numerator}π`;
    }
    return numerator === 1 ? `π/${reducedDenominator}` : `${numerator}π/${reducedDenominator}`;
  }

  function gcd(a, b) {
    let x = Math.abs(a);
    let y = Math.abs(b);
    while (y !== 0) {
      const rest = x % y;
      x = y;
      y = rest;
    }
    return x || 1;
  }

  function drawAxis(x1, y1, x2, y2, color) {
    drawArrow(x1, y1, x2, y2, color, 1.4);
  }

  function drawDirectionArrow(rightX, y, direction) {
    const start = direction === 1 ? rightX - 250 : rightX - 70;
    const end = direction === 1 ? rightX - 70 : rightX - 250;
    drawArrow(start, y, end, y, "#39e7f4", 2.2);
  }

  function drawLowerSineCurve(x0, x1, centerY, dividerY, height, p) {
    const waveWidth = x1 - x0;
    const yScale = Math.min(48, Math.max(26, (height - dividerY) * 0.15));
    ctx.save();
    ctx.lineWidth = 2.3;
    ctx.strokeStyle = "rgba(57, 231, 244, .82)";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "rgba(57, 231, 244, .36)";
    ctx.beginPath();
    const steps = Math.max(220, Math.round(waveWidth));
    for (let i = 0; i <= steps; i += 1) {
      const u = i / steps;
      const x = u * p.length;
      const px = x0 + u * waveWidth;
      const py = centerY - waveY(x, p) / maxAmplitude * yScale;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(57, 231, 244, .88)";
    ctx.font = "800 12px system-ui, sans-serif";
    ctx.fillText("横波の形", x0 + 8, centerY - yScale - 10);
    ctx.restore();
  }

  function drawArrow(x1, y1, x2, y2, color, width) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - 9 * Math.cos(angle - Math.PI / 6), y2 - 9 * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x2 - 9 * Math.cos(angle + Math.PI / 6), y2 - 9 * Math.sin(angle + Math.PI / 6));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawTicks(x0, x1, axisY, length, wavelength) {
    const count = Math.floor(length / wavelength);
    ctx.save();
    ctx.strokeStyle = "rgba(203, 213, 225, .28)";
    ctx.fillStyle = "#cbd5e1";
    ctx.lineWidth = 1;
    ctx.font = "700 12px system-ui, sans-serif";
    for (let i = 0; i <= count; i += 1) {
      const px = x0 + i * wavelength / length * (x1 - x0);
      ctx.beginPath();
      ctx.moveTo(px, axisY - 6);
      ctx.lineTo(px, axisY + 6);
      ctx.stroke();
      const label = i === 0 ? "0" : `${i}λ`;
      ctx.fillText(label, px - 8, axisY + 22);
    }
    ctx.restore();
  }

  function drawConnector(x1, y1, x2, y2, markerX, markerY) {
    ctx.save();
    ctx.strokeStyle = "rgba(237, 247, 255, .78)";
    ctx.lineWidth = 1.4;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.strokeStyle = "rgba(255, 107, 107, .85)";
    ctx.beginPath();
    ctx.moveTo(markerX, 70);
    ctx.lineTo(markerX, markerY + 44);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawVerticalMarker(x, y, axisY, color) {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(x, 70);
    ctx.lineTo(x, axisY + 82);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = color;
    ctx.font = "800 12px system-ui, sans-serif";
    ctx.fillText("位相マーカー", x - 42, axisY + 52);
    ctx.restore();
  }

  function drawDot(x, y, r, fill, stroke) {
    ctx.save();
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawSectionLine(x1, y, x2) {
    ctx.save();
    ctx.strokeStyle = "rgba(203, 213, 225, .22)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.stroke();
    ctx.restore();
  }

  function circle(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
  }

  function roundRect(x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
  }

  Object.values(controls).forEach((control) => {
    control.addEventListener("input", () => {
      updateControlOutputs();
      draw();
    });
  });

  togglePlayButton.addEventListener("click", () => {
    state.playing = !state.playing;
    updateControlOutputs();
  });

  resetButton.addEventListener("click", () => {
    state.t = 0;
    updateControlOutputs();
    draw();
  });

  canvas.addEventListener("pointerdown", (event) => {
    state.draggingMarker = true;
    canvas.setPointerCapture(event.pointerId);
    setMarkerFromClientX(event.clientX);
  });

  canvas.addEventListener("pointermove", (event) => {
    if (state.draggingMarker) setMarkerFromClientX(event.clientX);
  });

  canvas.addEventListener("pointerup", () => {
    state.draggingMarker = false;
  });

  window.addEventListener("keydown", (event) => {
    if (event.code === "Space" && event.target === document.body) {
      event.preventDefault();
      state.playing = !state.playing;
      updateControlOutputs();
    }
  });

  window.addEventListener("resize", draw);

  const clock = new PhysicsSimClock.FixedStepClock({
    step: 1 / 120,
    onStep(dt) {
      if (!state.playing) return;
      state.t += dt * Number(controls.speed.value);
    },
    onRender() {
      updateControlOutputs();
      draw();
    }
  });

  updateControlOutputs();
  draw();
  clock.start();
})();
</script>
</body>
</html>
