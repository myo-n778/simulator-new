<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>斜方投射 Re</title>
  <link rel="stylesheet" href="../../assets/common-sim.css">
  <script src="../../assets/sim-shell.js"></script>
  <script src="../../assets/sim-clock.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --surface: #101720;
      --surface-2: #0b131c;
      --surface-3: #0e1721;
      --ink: #e7edf5;
      --muted: #a7b0bd;
      --line: #182434;
      --accent: #68b7ff;
      --accent-strong: #9ad9ff;
      --green: #76d275;
      --orange: #ffcf5c;
      --red: #ff7a7a;
      --blue: #68b7ff;
      --canvas-bg-1: #0d141d;
      --canvas-bg-2: #0a1119;
      --grid-line: #1c2430;
      --ground-line: #34465d;
      --soft-panel: rgba(12, 21, 32, 0.9);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
    }

    body.theme-light {
      color-scheme: light;
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #eef3f7;
      --surface-3: #fbfcfd;
      --ink: #1b2430;
      --muted: #667382;
      --line: #d7e0e8;
      --accent: #1f6fb2;
      --accent-strong: #174d7d;
      --green: #2f8f5b;
      --orange: #c56d22;
      --red: #c7433c;
      --blue: #2e78c8;
      --canvas-bg-1: #f9fbfd;
      --canvas-bg-2: #eef4f9;
      --grid-line: #dbe5ee;
      --ground-line: #8ca0b2;
      --soft-panel: rgba(255, 255, 255, 0.92);
      --shadow: 0 16px 36px rgba(27, 36, 48, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    .sim-shell-header {
      border-bottom-color: var(--line);
      background: rgba(11, 15, 20, 0.92);
      color: var(--ink);
    }

    .sim-shell-back {
      border-color: var(--line);
      background: var(--surface);
      color: var(--accent-strong);
    }

    .sim-shell-subtitle {
      color: var(--muted);
    }

    @media (min-width: 560px) {
      .sim-shell-inner {
        flex-direction: row;
        align-items: center;
        gap: 12px;
        min-height: 48px;
        padding: 0;
      }

      .sim-shell-subtitle {
        display: none;
      }
    }

    body.theme-light .sim-shell-header {
      background: rgba(248, 250, 252, 0.9);
      color: #17202a;
    }

    body.theme-light .sim-shell-back {
      background: #ffffff;
      color: #2364aa;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 18px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3.2vw, 34px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .lead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .mode-tabs,
    .theme-tabs {
      display: inline-flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .mode-tabs button,
    .theme-tabs button,
    .action-row button,
    .view-tools button,
    .zoom-select,
    .speed-select {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .mode-tabs button {
      min-width: 82px;
      padding: 0 12px;
    }

    .theme-tabs button {
      min-width: 66px;
      padding: 0 12px;
    }

    .mode-tabs button.is-active,
    .theme-tabs button.is-active {
      background: var(--accent);
      color: var(--bg);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(220px, 0.7fr);
      gap: 12px;
      align-items: stretch;
    }

    .layout.is-detail {
      grid-template-columns: minmax(0, 0.98fr) minmax(360px, 1.02fr);
    }

    .stage,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .stage {
      display: flex;
      min-height: 0;
      flex-direction: column;
      padding: 12px;
    }

    .canvas-shell {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--canvas-bg-1) 0%, var(--canvas-bg-2) 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: clamp(320px, 48vh, 500px);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    .readouts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-top: 7px;
    }

    .canvas-help {
      position: absolute;
      right: 10px;
      bottom: 10px;
      max-width: min(320px, calc(100% - 20px));
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft-panel);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
    }

    .readout {
      min-height: 52px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .readout span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .readout strong {
      display: block;
      margin-top: 3px;
      font-size: 15px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .action-row,
    .view-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .action-row button,
    .view-tools button,
    .zoom-select {
      padding: 0 13px;
      border-color: var(--line);
      background: var(--surface-2);
      color: var(--ink);
    }

    .zoom-select,
    .speed-select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .action-row button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--bg);
    }

    .action-row button:hover,
    .view-tools button:hover,
    .zoom-select:hover,
    .mode-tabs button:hover,
    .theme-tabs button:hover {
      border-color: var(--accent);
    }

    .panel {
      min-height: 0;
      padding: 10px;
      overflow: hidden;
    }

    .panel h2 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .control-list {
      display: grid;
      gap: 6px;
    }

    .control {
      display: grid;
      gap: 4px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .control label,
    .check-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      min-width: 0;
    }

    .control label span,
    .check-row span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control input[type="number"] {
      width: 92px;
      min-height: 30px;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-3);
      color: var(--ink);
      text-align: right;
    }

    .control input[type="range"] {
      width: 100%;
      min-height: 28px;
      accent-color: var(--accent);
    }

    .control input[type="range"]::-webkit-slider-thumb {
      min-width: 22px;
      min-height: 22px;
    }

    .check-row {
      min-height: 34px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .check-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .subgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status-line {
      margin-top: 7px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 13px;
    }

    .collision-history {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-line strong {
      color: var(--ink);
    }

    [hidden] {
      display: none !important;
    }

    @media (min-width: 560px) {
      body {
        overflow: hidden;
      }

      .wrap {
        display: flex;
        height: calc(100dvh - 48px);
        min-height: 0;
        flex-direction: column;
      }

      .layout {
        flex: 1 1 auto;
        min-height: 0;
      }

      .stage,
      .panel {
        max-height: 100%;
      }

      .canvas-shell {
        flex: 1 1 auto;
      }

      canvas {
        height: 100%;
        min-height: 280px;
      }

      .control-list {
        gap: 8px;
      }

      .control {
        gap: 4px;
      }

      .panel[data-mode-current="detail"] .control-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .wrap {
        width: min(100% - 18px, 1180px);
        padding-top: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .lead {
        display: none;
      }

      .topbar {
        gap: 8px;
      }

      .layout {
        grid-template-columns: minmax(0, 1fr) minmax(210px, 0.62fr);
      }

      .layout.is-detail {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .layout.is-detail .stage,
      .layout.is-detail .panel {
        max-height: none;
      }

      .layout.is-detail .canvas-shell {
        flex: 0 0 auto;
      }

      .layout.is-detail canvas {
        height: 320px;
        min-height: 0;
      }

      .layout.is-detail .panel {
        overflow: visible;
      }

      .readouts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .readout strong {
        font-size: 14px;
      }
    }

    @media (max-width: 559px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      canvas {
        height: clamp(340px, 48vh, 460px);
      }

      .readouts {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 540px) {
      .wrap {
        width: min(100% - 18px, 1180px);
      }

      canvas {
        height: 330px;
      }

      .readouts,
      .subgrid {
        grid-template-columns: 1fr;
      }

      .action-row button,
      .view-tools button,
      .zoom-select {
        flex: 1 1 128px;
      }
    }

    @media (pointer: coarse) {
      .mode-tabs button,
      .theme-tabs button,
      .action-row button,
      .view-tools button,
      .zoom-select {
        min-height: 46px;
      }

      .control,
      .check-row {
        padding: 8px 10px;
      }

      .control input[type="number"] {
        min-height: 36px;
        width: 96px;
      }

      .control input[type="range"] {
        min-height: 36px;
      }
    }
  </style>
</head>
<body>
<script>
  PhysicsSimShell.create({
    title: '斜方投射 Re',
    subtitle: '基本/詳細UI・イベント時刻ベースの衝突処理',
    basePath: '../../'
  });
</script>

<main class="wrap">
  <div class="topbar">
    <div>
      <h1>斜方投射 Re</h1>
      <p class="lead">基本操作を絞り、壁と地面の衝突は各ステップ内で最初に起きるイベントとして扱います。</p>
    </div>
    <div class="top-actions">
      <div class="theme-tabs" role="group" aria-label="テーマ">
        <button type="button" class="is-active" data-theme="dark">Dark</button>
        <button type="button" data-theme="light">Light</button>
      </div>
      <div class="mode-tabs" role="group" aria-label="設定モード">
        <button type="button" class="is-active" data-mode="basic">基本</button>
        <button type="button" data-mode="detail">詳細</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <section class="stage" aria-label="斜方投射の表示">
      <div class="canvas-shell">
        <canvas id="view" width="1200" height="720"></canvas>
        <div class="canvas-help">1本指ドラッグで移動 / 2本指ピンチで拡大縮小</div>
      </div>
      <div class="readouts" aria-live="polite">
        <div class="readout"><span>時刻</span><strong id="read-time">0.00 s</strong></div>
        <div class="readout"><span>位置</span><strong id="read-pos">(0.00, 0.00) m</strong></div>
        <div class="readout"><span>速度</span><strong id="read-vel">0.00 m/s</strong></div>
        <div class="readout"><span>理論値</span><strong id="read-theory">-</strong></div>
      </div>
      <div class="action-row">
        <button id="play" type="button" class="primary">再生</button>
        <button id="step" type="button">1ステップ</button>
        <button id="reset" type="button">リセット</button>
        <button id="fit" type="button">全体表示</button>
        <select id="speedPreset" class="speed-select" aria-label="再生倍率">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
        <select id="zoomPreset" class="zoom-select" aria-label="表示倍率">
          <option value="fit">全体</option>
          <option value="0.75">75%</option>
          <option value="1">100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
        </select>
      </div>
      <div class="status-line collision-history" id="event-status">衝突履歴: <strong>未発生</strong></div>
    </section>

    <aside class="panel" aria-label="設定">
      <section data-panel="basic">
        <h2>基本</h2>
        <div class="control-list">
          <div class="control" data-control="v0">
            <label><span>初速度 v0 [m/s]</span><input id="v0n" type="number" step="0.1"></label>
            <input id="v0" type="range" min="1" max="80" step="0.1">
          </div>
          <div class="control" data-control="angle">
            <label><span>射角 θ [deg]</span><input id="angn" type="number" step="0.1"></label>
            <input id="ang" type="range" min="-10" max="85" step="0.1">
          </div>
          <div class="control" data-control="g">
            <label><span>重力 g [m/s²]</span><input id="gn" type="number" step="0.1"></label>
            <input id="g" type="range" min="1" max="20" step="0.1">
          </div>
          <label class="check-row"><span>軌道表示</span><input id="trace" type="checkbox"></label>
        </div>
      </section>

      <section data-panel="detail" hidden>
        <h2>詳細</h2>
        <div class="control-list">
          <div class="subgrid">
            <div class="control">
              <label><span>初期位置 x0 [m]</span><input id="x0n" type="number" step="0.1"></label>
              <input id="x0" type="range" min="-10" max="30" step="0.1">
            </div>
            <div class="control">
              <label><span>初期高さ y0 [m]</span><input id="y0n" type="number" step="0.1"></label>
              <input id="y0" type="range" min="0" max="30" step="0.1">
            </div>
          </div>
          <label class="check-row"><span>壁を表示</span><input id="showWall" type="checkbox"></label>
          <div class="subgrid">
            <div class="control">
              <label><span>壁位置 xw [m]</span><input id="wxn" type="number" step="0.1"></label>
              <input id="wx" type="range" min="-10" max="80" step="0.1">
            </div>
            <div class="control">
              <label><span>壁高さ hw [m]</span><input id="whn" type="number" step="0.1"></label>
              <input id="wh" type="range" min="0" max="40" step="0.1">
            </div>
          </div>
          <div class="subgrid">
            <div class="control">
              <label><span>壁反発 ew</span><input id="ewn" type="number" step="0.01"></label>
              <input id="ew" type="range" min="0" max="1" step="0.01">
            </div>
            <div class="control">
              <label><span>地面反発 eg</span><input id="egn" type="number" step="0.01"></label>
              <input id="eg" type="range" min="0" max="1" step="0.01">
            </div>
          </div>
          <div class="subgrid">
            <div class="control">
              <label><span>時間刻み dt [s]</span><input id="dtn" type="number" step="0.001"></label>
              <input id="dt" type="range" min="0.001" max="0.05" step="0.001">
            </div>
            <div class="control">
              <label><span>タイムスケール</span><input id="speedn" type="number" step="0.1"></label>
              <input id="speed" type="range" min="0.1" max="3" step="0.1">
            </div>
          </div>
          <div class="subgrid">
            <label class="check-row"><span>理論軌道</span><input id="showTheory" type="checkbox"></label>
            <label class="check-row"><span>グリッド</span><input id="showGrid" type="checkbox"></label>
          </div>
          <label class="check-row"><span>地面到達で停止</span><input id="stopOnGround" type="checkbox"></label>
          <div class="view-tools">
            <button id="zin" type="button">拡大</button>
            <button id="zout" type="button">縮小</button>
            <button id="panL" type="button">左</button>
            <button id="panR" type="button">右</button>
            <button id="panU" type="button">上</button>
            <button id="panD" type="button">下</button>
          </div>
        </div>
      </section>
    </aside>
  </div>
</main>

<script>
(() => {
  'use strict';

  const EPS = 1e-9;
  const REST_SPEED = 0.04;
  const $ = (id) => document.getElementById(id);

  const canvas = $('view');
  const ctx = canvas.getContext('2d');
  let dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));

  const params = {
    x0: 0,
    y0: 0,
    v0: 18,
    angle: 38,
    g: 9.8,
    showWall: true,
    wallX: 23,
    wallH: 7,
    ew: 1,
    eg: 0.72,
    dt: 0.012,
    speed: 1,
    trace: true,
    showTheory: true,
    showGrid: true,
    stopOnGround: false
  };

  const state = {
    t: 0,
    x: params.x0,
    y: params.y0,
    vx: 0,
    vy: 0,
    playing: false,
    path: [],
    hits: [],
    view: { xmin: -2, xmax: 38, ymin: -1.5, ymax: 16 },
    lastEvent: null
  };

  const bindings = [
    ['v0', 'v0n', 'v0'],
    ['ang', 'angn', 'angle'],
    ['g', 'gn', 'g'],
    ['x0', 'x0n', 'x0'],
    ['y0', 'y0n', 'y0'],
    ['wx', 'wxn', 'wallX'],
    ['wh', 'whn', 'wallH'],
    ['ew', 'ewn', 'ew'],
    ['eg', 'egn', 'eg'],
    ['dt', 'dtn', 'dt'],
    ['speed', 'speedn', 'speed']
  ];

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    canvas.width = Math.max(1, Math.round(rect.width * dpr));
    canvas.height = Math.max(1, Math.round(rect.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  function theory() {
    const th = params.angle * Math.PI / 180;
    const vx0 = params.v0 * Math.cos(th);
    const vy0 = params.v0 * Math.sin(th);
    const a = -0.5 * params.g;
    const b = vy0;
    const c = params.y0;
    const disc = Math.max(0, b * b - 4 * a * c);
    const roots = [
      (-b - Math.sqrt(disc)) / (2 * a),
      (-b + Math.sqrt(disc)) / (2 * a)
    ].filter((t) => Number.isFinite(t) && t >= 0);
    const tGround = roots.length ? Math.max(...roots) : 0;
    const tApex = Math.max(0, vy0 / params.g);
    return {
      vx0,
      vy0,
      tGround,
      range: params.x0 + vx0 * tGround,
      apexX: params.x0 + vx0 * tApex,
      apexY: params.y0 + vy0 * tApex - 0.5 * params.g * tApex * tApex,
      tApex
    };
  }

  function resetSimulation(keepView = false) {
    const th = params.angle * Math.PI / 180;
    state.t = 0;
    state.x = params.x0;
    state.y = params.y0;
    state.vx = params.v0 * Math.cos(th);
    state.vy = params.v0 * Math.sin(th);
    state.playing = false;
    state.path = [[state.x, state.y]];
    state.hits = [];
    state.lastEvent = null;
    if (!keepView) fitView();
    draw();
  }

  function integrate(dt) {
    state.x += state.vx * dt;
    state.y += state.vy * dt - 0.5 * params.g * dt * dt;
    state.vy -= params.g * dt;
    state.t += dt;
  }

  function groundEventTime(limit) {
    if (params.g <= 0) return null;
    if (state.y <= EPS && state.vy <= 0) return null;
    const a = -0.5 * params.g;
    const b = state.vy;
    const c = state.y;
    const disc = b * b - 4 * a * c;
    if (disc < 0) return null;
    const sqrt = Math.sqrt(disc);
    const candidates = [
      (-b - sqrt) / (2 * a),
      (-b + sqrt) / (2 * a)
    ].filter((t) => t > EPS && t <= limit + EPS);
    for (const t of candidates.sort((a0, b0) => a0 - b0)) {
      const vyAt = state.vy - params.g * t;
      if (vyAt < 0) return Math.min(t, limit);
    }
    return null;
  }

  function wallEventTime(limit) {
    if (!params.showWall || Math.abs(state.vx) < EPS) return null;
    const t = (params.wallX - state.x) / state.vx;
    if (!(t > EPS && t <= limit + EPS)) return null;
    const yAt = state.y + state.vy * t - 0.5 * params.g * t * t;
    if (yAt < -EPS || yAt > params.wallH + EPS) return null;
    return Math.min(t, limit);
  }

  function nextEvent(limit) {
    const ground = groundEventTime(limit);
    const wall = wallEventTime(limit);
    if (ground === null && wall === null) return null;
    if (ground !== null && (wall === null || ground <= wall)) {
      return { type: 'ground', time: ground };
    }
    return { type: 'wall', time: wall };
  }

  function pushPath() {
    if (!params.trace) return;
    const last = state.path.at(-1);
    if (!last || Math.hypot(last[0] - state.x, last[1] - state.y) > 0.002) {
      state.path.push([state.x, state.y]);
    }
    if (state.path.length > 3500) state.path.splice(0, state.path.length - 3500);
  }

  function handleCollision(type) {
    const before = { vx: state.vx, vy: state.vy };
    if (type === 'wall') {
      state.x = params.wallX;
      state.vx = -params.ew * state.vx;
      state.x += Math.sign(state.vx || 1) * 1e-6;
    } else {
      state.y = 0;
      if (params.stopOnGround || params.eg === 0) {
        state.vx = 0;
        state.vy = 0;
        state.playing = false;
      } else {
        state.vy = -params.eg * state.vy;
        if (Math.abs(state.vy) < REST_SPEED) {
          state.vx = 0;
          state.vy = 0;
          state.playing = false;
        } else {
          state.y = 1e-6;
        }
      }
    }
    state.lastEvent = {
      type,
      t: state.t,
      x: type === 'wall' ? params.wallX : state.x,
      y: type === 'ground' ? 0 : state.y,
      vx: before.vx,
      vy: before.vy
    };
    state.hits.push(state.lastEvent);
  }

  function stepSimulation(dt, render = true) {
    if (state.y <= EPS && state.vy <= 0 && Math.hypot(state.vx, state.vy) < REST_SPEED) {
      state.y = 0;
      state.vx = 0;
      state.vy = 0;
      state.playing = false;
      if (render) draw();
      return;
    }
    let remaining = Math.max(0, dt);
    let guard = 0;
    while (remaining > EPS && guard < 40) {
      guard++;
      const event = nextEvent(remaining);
      if (!event) {
        integrate(remaining);
        pushPath();
        remaining = 0;
        break;
      }
      integrate(event.time);
      if (event.type === 'ground') state.y = 0;
      pushPath();
      handleCollision(event.type);
      pushPath();
      remaining -= event.time;
      if (!state.playing && event.type === 'ground') break;
    }
    if (state.t > 1200) state.playing = false;
    if (render) draw();
  }

  function fitView() {
    const th = theory();
    const xs = [params.x0, th.range, th.apexX, state.x];
    const ys = [0, params.y0, th.apexY, state.y];
    if (params.showWall) {
      xs.push(params.wallX);
      ys.push(params.wallH);
    }
    const xmin = Math.min(...xs) - 2;
    const xmax = Math.max(...xs) + 2;
    const ymin = -1.5;
    const ymax = Math.max(3, Math.max(...ys) + 2);
    state.view = { xmin, xmax: Math.max(xmax, xmin + 8), ymin, ymax };
  }

  function worldToScreen(x, y) {
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    const v = state.view;
    return [
      (x - v.xmin) * width / (v.xmax - v.xmin),
      height - (y - v.ymin) * height / (v.ymax - v.ymin)
    ];
  }

  function screenToWorld(screenX, screenY) {
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    const v = state.view;
    return [
      v.xmin + screenX * (v.xmax - v.xmin) / width,
      v.ymin + (height - screenY) * (v.ymax - v.ymin) / height
    ];
  }

  function niceStep(span) {
    const raw = span / 8;
    const pow = 10 ** Math.floor(Math.log10(raw));
    const f = raw / pow;
    if (f < 1.5) return pow;
    if (f < 3.5) return 2 * pow;
    if (f < 7.5) return 5 * pow;
    return 10 * pow;
  }

  function drawGrid(width, height) {
    if (!params.showGrid) return;
    const v = state.view;
    const sx = niceStep(v.xmax - v.xmin);
    const sy = niceStep(v.ymax - v.ymin);
    ctx.save();
    ctx.strokeStyle = getCss('--grid-line');
    ctx.lineWidth = 1;
    for (let x = Math.ceil(v.xmin / sx) * sx; x <= v.xmax; x += sx) {
      const [px] = worldToScreen(x, 0);
      ctx.beginPath();
      ctx.moveTo(px, 0);
      ctx.lineTo(px, height);
      ctx.stroke();
    }
    for (let y = Math.ceil(v.ymin / sy) * sy; y <= v.ymax; y += sy) {
      const [, py] = worldToScreen(0, y);
      ctx.beginPath();
      ctx.moveTo(0, py);
      ctx.lineTo(width, py);
      ctx.stroke();
    }
    const [, gy] = worldToScreen(0, 0);
    ctx.strokeStyle = getCss('--ground-line');
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(width, gy);
    ctx.stroke();
    ctx.restore();
  }

  function getCss(name) {
    return getComputedStyle(document.body).getPropertyValue(name).trim();
  }

  function drawTheoryPath() {
    if (!params.showTheory) return;
    const th = theory();
    const count = 180;
    ctx.save();
    ctx.strokeStyle = getCss('--blue');
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    for (let i = 0; i <= count; i++) {
      const t = th.tGround * i / count;
      const x = params.x0 + th.vx0 * t;
      const y = params.y0 + th.vy0 * t - 0.5 * params.g * t * t;
      const [px, py] = worldToScreen(x, y);
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.restore();
  }

  function drawPath() {
    if (!params.trace || state.path.length < 2) return;
    ctx.save();
    ctx.strokeStyle = '#2f8f5b';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    state.path.forEach(([x, y], index) => {
      const [px, py] = worldToScreen(x, y);
      if (index === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.restore();
  }

  function drawWall() {
    if (!params.showWall) return;
    const [x0, y0] = worldToScreen(params.wallX, 0);
    const [x1, y1] = worldToScreen(params.wallX, params.wallH);
    ctx.save();
    ctx.strokeStyle = getCss('--orange');
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
    ctx.fillStyle = getCss('--orange');
    ctx.fillRect(x1 - 8, y1 - 3, 16, 6);
    ctx.restore();
  }

  function drawMarker(x, y, color, radius = 5) {
    const [px, py] = worldToScreen(x, y);
    ctx.save();
    ctx.fillStyle = color;
    ctx.strokeStyle = getCss('--surface');
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawHitMarker(hit, index) {
    const [px, py] = worldToScreen(hit.x, hit.y);
    const color = hit.type === 'wall' ? getCss('--orange') : getCss('--red');
    ctx.save();
    ctx.fillStyle = color;
    ctx.strokeStyle = getCss('--surface');
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(px, py, 5.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = getCss('--bg');
    ctx.font = '700 9px system-ui, -apple-system, Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(index + 1), px, py + 0.3);
    ctx.restore();
  }

  function drawLabel(lines, x, y, color = '#1b2430') {
    const [px, py] = worldToScreen(x, y);
    ctx.save();
    ctx.font = '12px system-ui, -apple-system, Segoe UI, sans-serif';
    const pad = 6;
    const lineHeight = 16;
    const w = Math.max(...lines.map((line) => ctx.measureText(line).width)) + pad * 2;
    const h = lineHeight * lines.length + pad;
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    let bx = px + 10;
    let by = py - h - 10;
    if (bx + w > width - 6) bx = px - w - 10;
    if (by < 6) by = py + 10;
    if (by + h > height - 6) by = height - h - 6;
    ctx.fillStyle = getCss('--soft-panel');
    ctx.strokeStyle = getCss('--line');
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(bx, by, w, h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = color;
    lines.forEach((line, index) => ctx.fillText(line, bx + pad, by + pad + 12 + index * lineHeight));
    ctx.restore();
  }

  function draw() {
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    ctx.clearRect(0, 0, width, height);
    drawGrid(width, height);
    drawTheoryPath();
    drawWall();
    drawPath();

    const th = theory();
    drawMarker(params.x0, params.y0, getCss('--blue'), 4);
    drawMarker(th.apexX, th.apexY, getCss('--blue'), 4);
    drawMarker(state.x, Math.max(0, state.y), getCss('--red'), 6);
    drawLabel(['最高点', `(${th.apexX.toFixed(2)}, ${th.apexY.toFixed(2)}) m`], th.apexX, th.apexY, getCss('--accent-strong'));

    state.hits.forEach((hit, index) => drawHitMarker(hit, index));

    updateReadouts();
  }

  function updateReadouts() {
    const speed = Math.hypot(state.vx, state.vy);
    const th = theory();
    $('read-time').textContent = `${state.t.toFixed(2)} s / ${params.speed.toFixed(1)}x`;
    $('read-pos').textContent = `(${state.x.toFixed(2)}, ${Math.max(0, state.y).toFixed(2)}) m`;
    $('read-vel').textContent = `${speed.toFixed(2)} m/s`;
    $('read-theory').textContent = `R ${th.range.toFixed(2)} m`;
    if (state.hits.length) {
      const history = state.hits.map((hit, index) => {
        const label = hit.type === 'wall' ? '壁' : '地面';
        return `${index + 1}:${label} t=${hit.t.toFixed(2)} (${hit.x.toFixed(2)}, ${hit.y.toFixed(2)})`;
      }).join(' / ');
      $('event-status').innerHTML = `衝突履歴 ${state.hits.length}件: <strong>${history}</strong>`;
    } else {
      $('event-status').innerHTML = '衝突履歴: <strong>未発生</strong>';
    }
    $('play').textContent = state.playing ? '一時停止' : '再生';
  }

  function syncInputs() {
    bindings.forEach(([rangeId, numberId, key]) => {
      $(rangeId).value = params[key];
      $(numberId).value = params[key];
    });
    $('trace').checked = params.trace;
    $('showWall').checked = params.showWall;
    $('showTheory').checked = params.showTheory;
    $('showGrid').checked = params.showGrid;
    $('stopOnGround').checked = params.stopOnGround;
    $('speedPreset').value = String(params.speed);
  }

  function updateParam(key, value) {
    params[key] = value;
    if (key === 'speed') {
      const preset = [...$('speedPreset').options].some((option) => Number(option.value) === value);
      $('speedPreset').value = preset ? String(value) : '1';
    }
    resetSimulation(true);
  }

  function hookInputs() {
    bindings.forEach(([rangeId, numberId, key]) => {
      const range = $(rangeId);
      const number = $(numberId);
      range.addEventListener('input', () => {
        const value = Number(range.value);
        number.value = value;
        updateParam(key, value);
      });
      number.addEventListener('input', () => {
        const value = Number(number.value);
        if (!Number.isFinite(value)) return;
        range.value = value;
        updateParam(key, value);
      });
      number.addEventListener('change', () => {
        const value = Number(number.value);
        range.value = value;
        updateParam(key, value);
      });
    });
    [
      ['trace', 'trace'],
      ['showWall', 'showWall'],
      ['showTheory', 'showTheory'],
      ['showGrid', 'showGrid'],
      ['stopOnGround', 'stopOnGround']
    ].forEach(([id, key]) => {
      $(id).addEventListener('change', (event) => {
        params[key] = event.target.checked;
        resetSimulation(true);
      });
    });

    document.querySelectorAll('[data-mode]').forEach((button) => {
      button.addEventListener('click', () => setMode(button.dataset.mode));
    });
    document.querySelectorAll('[data-theme]').forEach((button) => {
      button.addEventListener('click', () => setTheme(button.dataset.theme));
    });

    $('play').addEventListener('click', () => {
      state.playing = !state.playing;
      draw();
    });
    $('step').addEventListener('click', () => stepSimulation(params.dt));
    $('reset').addEventListener('click', () => resetSimulation(false));
    $('fit').addEventListener('click', () => {
      fitView();
      $('zoomPreset').value = 'fit';
      draw();
    });
    $('zoomPreset').addEventListener('change', (event) => applyZoomPreset(event.target.value));
    $('speedPreset').addEventListener('change', (event) => {
      params.speed = Number(event.target.value);
      $('speed').value = params.speed;
      $('speedn').value = params.speed;
      draw();
    });
    $('zin').addEventListener('click', () => {
      $('zoomPreset').value = 'fit';
      zoomAtCenter(1.12);
    });
    $('zout').addEventListener('click', () => {
      $('zoomPreset').value = 'fit';
      zoomAtCenter(1 / 1.12);
    });
    $('panL').addEventListener('click', () => pan(-0.12, 0));
    $('panR').addEventListener('click', () => pan(0.12, 0));
    $('panU').addEventListener('click', () => pan(0, 0.12));
    $('panD').addEventListener('click', () => pan(0, -0.12));

    const pointers = new Map();
    let lastSingle = null;
    let pinch = null;

    function canvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return { x: event.clientX - rect.left, y: event.clientY - rect.top };
    }

    function firstTwoPointers() {
      return [...pointers.values()].slice(0, 2);
    }

    function midpoint(points) {
      return {
        x: (points[0].x + points[1].x) / 2,
        y: (points[0].y + points[1].y) / 2
      };
    }

    function distance(points) {
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    function refreshPointerMode() {
      if (pointers.size === 1) {
        lastSingle = [...pointers.values()][0];
        pinch = null;
      } else if (pointers.size >= 2) {
        const points = firstTwoPointers();
        pinch = { distance: distance(points), midpoint: midpoint(points) };
        lastSingle = null;
      } else {
        lastSingle = null;
        pinch = null;
        canvas.classList.remove('dragging');
      }
    }

    canvas.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      pointers.set(event.pointerId, canvasPoint(event));
      canvas.setPointerCapture(event.pointerId);
      canvas.classList.add('dragging');
      refreshPointerMode();
    });
    canvas.addEventListener('pointermove', (event) => {
      if (!pointers.has(event.pointerId)) return;
      event.preventDefault();
      const point = canvasPoint(event);
      pointers.set(event.pointerId, point);
      if (pointers.size === 1 && lastSingle) {
        panPixels(point.x - lastSingle.x, point.y - lastSingle.y);
        lastSingle = point;
      } else if (pointers.size >= 2 && pinch) {
        const points = firstTwoPointers();
        const nextMidpoint = midpoint(points);
        const nextDistance = Math.max(1, distance(points));
        const rawScale = nextDistance / Math.max(1, pinch.distance);
        const dampedScale = 1 + (rawScale - 1) * 0.32;
        const scale = Math.max(0.94, Math.min(1.06, dampedScale));
        zoomAt(nextMidpoint.x, nextMidpoint.y, scale);
        panPixels(nextMidpoint.x - pinch.midpoint.x, nextMidpoint.y - pinch.midpoint.y);
        pinch = { distance: nextDistance, midpoint: nextMidpoint };
      }
    });

    function endPointer(event) {
      pointers.delete(event.pointerId);
      if (canvas.hasPointerCapture(event.pointerId)) {
        canvas.releasePointerCapture(event.pointerId);
      }
      refreshPointerMode();
    }

    canvas.addEventListener('pointerup', endPointer);
    canvas.addEventListener('pointercancel', endPointer);
    canvas.addEventListener('lostpointercapture', (event) => {
      pointers.delete(event.pointerId);
      refreshPointerMode();
    });
    canvas.addEventListener('wheel', (event) => {
      event.preventDefault();
      const point = canvasPoint(event);
      const scale = event.deltaY < 0 ? 1.035 : 1 / 1.035;
      $('zoomPreset').value = 'fit';
      zoomAt(point.x, point.y, scale);
    }, { passive: false });
    canvas.addEventListener('dblclick', (event) => {
      const point = canvasPoint(event);
      $('zoomPreset').value = 'fit';
      zoomAt(point.x, point.y, 1.12);
    });
  }

  function setMode(mode) {
    document.querySelectorAll('[data-mode]').forEach((button) => {
      button.classList.toggle('is-active', button.dataset.mode === mode);
    });
    document.querySelector('[data-panel="basic"]').hidden = mode !== 'basic';
    document.querySelector('[data-panel="detail"]').hidden = mode !== 'detail';
    document.querySelector('.panel').dataset.modeCurrent = mode;
    document.querySelector('.layout').classList.toggle('is-detail', mode === 'detail');
    requestAnimationFrame(resizeCanvas);
  }

  function setTheme(theme) {
    document.body.classList.toggle('theme-light', theme === 'light');
    document.querySelectorAll('[data-theme]').forEach((button) => {
      button.classList.toggle('is-active', button.dataset.theme === theme);
    });
    draw();
  }

  function applyZoomPreset(value) {
    fitView();
    if (value !== 'fit') {
      zoomAtCenter(Number(value));
    } else {
      draw();
    }
  }

  function zoomAt(screenX, screenY, scale) {
    const [worldX, worldY] = screenToWorld(screenX, screenY);
    const v = state.view;
    const nextW = (v.xmax - v.xmin) / scale;
    const nextH = (v.ymax - v.ymin) / scale;
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    const rx = screenX / width;
    const ry = 1 - screenY / height;
    state.view = {
      xmin: worldX - nextW * rx,
      xmax: worldX + nextW * (1 - rx),
      ymin: worldY - nextH * ry,
      ymax: worldY + nextH * (1 - ry)
    };
    draw();
  }

  function zoomAtCenter(scale) {
    zoomAt((canvas.width / dpr) / 2, (canvas.height / dpr) / 2, scale);
  }

  function panPixels(dx, dy) {
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    const v = state.view;
    const wx = dx * (v.xmax - v.xmin) / width;
    const wy = dy * (v.ymax - v.ymin) / height;
    state.view = { xmin: v.xmin - wx, xmax: v.xmax - wx, ymin: v.ymin + wy, ymax: v.ymax + wy };
    draw();
  }

  function pan(rx, ry) {
    const v = state.view;
    const dx = rx * (v.xmax - v.xmin);
    const dy = ry * (v.ymax - v.ymin);
    state.view = { xmin: v.xmin + dx, xmax: v.xmax + dx, ymin: v.ymin + dy, ymax: v.ymax + dy };
    draw();
  }

  let accumulator = 0;
  const clock = new PhysicsSimClock.FixedStepClock({
    step: 1 / 120,
    onStep(dt) {
      if (!state.playing) {
        accumulator = 0;
        return;
      }
      accumulator += dt * params.speed;
      let guard = 0;
      while (state.playing && accumulator > EPS && guard < 25) {
        const h = Math.min(params.dt, accumulator);
        stepSimulation(h, false);
        accumulator -= h;
        guard++;
      }
      if (!state.playing) accumulator = 0;
    },
    onRender() {
      draw();
    }
  });

  syncInputs();
  hookInputs();
  setMode('basic');
  resetSimulation(false);
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  clock.start();
})();
</script>
</body>
</html>
